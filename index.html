<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Quarta da Sorte</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="topo">
        <h1>✨ Quarta da Sorte ✨</h1>
        <p>Escolha seu bilhete da sorte</p>
    </header>


    <section class="banner">
        <div class="conteudo-banner">
            <h2>🍀 Boa sorte!</h2>
            <p>
                Participe e concorra aos prêmios
            </p>

            <button id="btnComprar">
                Comprar Bilhete
            </button>
        </div>
    </section>


    <section class="area-bilhetes">

        <h2>🎟️ Bilhetes Disponíveis</h2>

        <div id="listaBilhetes" class="lista-bilhetes">
            <!-- Os bilhetes serão carregados pelo JavaScript -->
        </div>

    </section>


    <section class="premios">

        <h2>🏆 Prêmios</h2>

        <div class="cards-premios">

            <div class="card">
                <h3>🥇 1º Prêmio</h3>
                <p>Grande prêmio da semana</p>
            </div>


            <div class="card">
                <h3>🥈 2º Prêmio</h3>
                <p>Prêmio especial</p>
            </div>


            <div class="card">
                <h3>🥉 3º Prêmio</h3>
                <p>Mais uma chance de ganhar</p>
            </div>

        </div>

    </section>


    <footer>

        <p>
            © Quarta da Sorte - Boa sorte 🍀
        </p>

    </footer>


<script src="script.js"></script>

</body>
</html>
